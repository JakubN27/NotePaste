name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Package release artifacts
        run: npm run package:release

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/release/notepaste-obsidian-plugin-*.zip
            dist/release/NotePaste-Camera-*.zip
            dist/release/NotePaste-Camera-*.dmg
            dist/release/checksums.txt
